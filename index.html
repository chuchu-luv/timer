<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전문직 시험 응원 타이머</title>
  <style>
    @font-face {
      font-family: 'EutmanEungtteong';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/OKDDUNG.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MitmiFont';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2402_1@1.0/Ownglyph_meetme-Rg.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'KerisKeduLine';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_Line.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'OngleipParkDahyeon';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --bg-1: #fff9fc;
      --bg-2: #fff1f7;
      --bg-3: #ffe8f2;
      --deep: #c34b8d;
      --deep-soft: #a96787;
      --soft: #b77f9b;
      --white-line: rgba(255,255,255,0.92);
      --circle-shadow: 0 18px 42px rgba(228, 112, 166, 0.15);
      --panel-shadow: 0 12px 26px rgba(205, 123, 161, 0.12);
      --pink-1: #f3d5df;
      --pink-2: #e8bccd;
      --pink-3: #ddb2c4;
      --lav-1: #dce8f5;
      --lav-2: #d3ddf3;
      --lav-3: #cecdef;
      --mint-1: #d7ece9;
      --mint-2: #c7e1df;
      --mint-3: #b7d8d4;
      --yellow-1: #fff2c9;
      --yellow-2: #ffe7b5;
      --yellow-3: #f8d79a;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }
    body {
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--deep-soft);
      background:
        radial-gradient(circle at 14% 14%, rgba(255,255,255,0.96), transparent 24%),
        radial-gradient(circle at 86% 16%, rgba(255,255,255,0.54), transparent 20%),
        linear-gradient(150deg, var(--bg-1), var(--bg-2) 54%, var(--bg-3));
      overflow-x: hidden;
      position: relative;
    }

    #sparkle-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      background: rgba(255,255,255,0.95);
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
      opacity: 0;
      animation: twinkle linear infinite;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.82));
    }
    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.55) rotate(0deg); }
      45% { opacity: 0.95; transform: scale(1.35) rotate(36deg); }
      100% { opacity: 0; transform: scale(0.55) rotate(90deg); }
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px 18px 26px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: 'KerisKeduLine', 'Apple SD Gothic Neo', sans-serif !important;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.06;
      color: var(--deep);
      text-shadow:
        -3px 0 #fff, 3px 0 #fff, 0 -3px #fff, 0 3px #fff,
        -3px -3px #fff, 3px -3px #fff, -3px 3px #fff, 3px 3px #fff,
        0 6px 16px rgba(255,255,255,0.52);
    }
    .title-emoji {
      margin-right: 8px;
      font-size: 0.9em;
      vertical-align: 0.04em;
    }
    .subtitle {
      margin: 6px auto 16px;
      max-width: 720px;
      text-align: center;
      font-size: clamp(0.9rem, 1.35vw, 1.05rem);
      line-height: 1.6;
      color: var(--soft);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 22px;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 140px);
    }

    .left-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-circle {
      position: relative;
      width: clamp(360px, 44vw, 520px);
      height: clamp(360px, 44vw, 520px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.995), rgba(255,248,252,0.988) 58%, rgba(255,234,244,0.965));
      border: 14px solid rgba(255,255,255,0.84);
      box-shadow:
        inset 0 0 28px rgba(255,255,255,0.98),
        var(--circle-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 26px 22px 28px;
    }

    .top-sparkle {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.15rem;
      color: #ffd16b;
      text-shadow: 0 0 12px rgba(255, 240, 178, 0.95);
      animation: floatSpark 2.5s ease-in-out infinite;
    }
    @keyframes floatSpark {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-4px); }
    }

    .mode-label {
      font-size: clamp(0.92rem, 1.1vw, 1.02rem);
      color: var(--deep);
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,182,212,0.58);
      border-radius: 999px;
      padding: 8px 18px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
    }

    .time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-family: 'EutmanEungtteong', 'Apple SD Gothic Neo', sans-serif !important;
      font-size: clamp(5rem, 10.2vw, 8.8rem);
      line-height: 0.88;
      color: #c24389;
      text-shadow: 0 4px 0 rgba(255,255,255,0.44);
      margin: 2px 0 10px;
      min-height: 1em;
      transform-origin: center;
      transition: transform 0.16s ease, text-shadow 0.16s ease;
      user-select: none;
    }
    .digit, .colon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .digit {
      width: 0.67em;
    }
    .colon {
      width: 0.28em;
      transform: translateY(-0.02em);
    }

    .status {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: pre-line;
      text-align: center;
      font-size: clamp(1.02rem, 1.35vw, 1.22rem);
      line-height: 1.45;
      color: #af668b;
      padding: 0 10px;
      transform-origin: center;
      transition: transform 0.16s ease;
    }

    .control-row {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .icon-btn {
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
      font-size: 1.46rem;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 18px rgba(235, 103, 168, 0.2);
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }
    .icon-btn:hover { transform: translateY(-2px); }
    .icon-btn:active { transform: translateY(1px) scale(0.98); }
    .icon-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .pause-btn { background: linear-gradient(145deg, #ffaad3, #ff8dc4); }
    .resume-btn { background: linear-gradient(145deg, #ffa1cf, #ff74b8); }
    .stop-btn { background: linear-gradient(145deg, #df75ad, #c84d90); }

    .sound-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.84);
      color: var(--deep);
      font-size: 0.94rem;
      box-shadow: 0 8px 16px rgba(234, 112, 172, 0.12);
      transition: transform 0.16s ease;
    }
    .sound-btn:hover { transform: translateY(-1px); }

    .right-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-content: center;
      justify-items: center;
    }

    .preset-btn {
      border: none;
      cursor: pointer;
      width: 100%;
      min-height: 94px;
      border-radius: 24px;
      padding: 14px 12px 12px;
      color: #68435b;
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow: var(--panel-shadow);
      text-align: center;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }
    .preset-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 24px rgba(190, 129, 161, 0.16);
      filter: saturate(1.03);
    }
    .preset-btn:active { transform: translateY(1px) scale(0.99); }
    .preset-btn.pink { background: linear-gradient(145deg, var(--pink-1), var(--pink-2) 60%, var(--pink-3)); }
    .preset-btn.lavender { background: linear-gradient(145deg, var(--lav-1), var(--lav-2) 60%, var(--lav-3)); }
    .preset-btn.mint { background: linear-gradient(145deg, var(--mint-1), var(--mint-2) 60%, var(--mint-3)); }
    .preset-btn.yellow { background: linear-gradient(145deg, var(--yellow-1), var(--yellow-2) 60%, var(--yellow-3)); }

    .preset-main {
      display: block;
      font-family: 'OngleipParkDahyeon', 'Apple SD Gothic Neo', sans-serif !important;
      font-size: clamp(1.5rem, 1.8vw, 1.95rem);
      line-height: 1.05;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
      color: #613a52;
    }
    .preset-sub {
      display: block;
      font-size: 0.96rem;
      letter-spacing: 0.04em;
      color: #7a5b70;
    }

    .done-flash {
      animation: pulseGlow 1.15s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% {
        box-shadow:
          inset 0 0 28px rgba(255,255,255,0.98),
          0 18px 42px rgba(232, 106, 167, 0.15);
      }
      50% {
        box-shadow:
          inset 0 0 34px rgba(255,255,255,1),
          0 0 0 12px rgba(255,160,204,0.12),
          0 22px 48px rgba(232, 106, 167, 0.24);
      }
    }

    .urgent {
      animation: urgentBeat 0.72s ease-in-out infinite;
    }
    @keyframes urgentBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }
    .time.urgent {
      color: #d44c82;
      text-shadow: 0 4px 0 rgba(255,255,255,0.42), 0 0 18px rgba(255, 190, 214, 0.56);
    }

    @media (max-width: 920px) {
      .page {
        padding: 10px 14px 24px;
      }
      .workspace {
        grid-template-columns: 1fr;
        gap: 18px;
        min-height: auto;
      }
      .right-panel {
        width: 100%;
        grid-template-columns: repeat(2, minmax(140px, 190px));
        justify-content: center;
        align-content: start;
      }
      .timer-circle {
        width: min(80vw, 500px);
        height: min(80vw, 500px);
      }
    }

    @media (max-width: 560px) {
      .title {
        font-size: clamp(1.9rem, 9.5vw, 2.8rem);
      }
      .subtitle {
        font-size: 0.9rem;
        margin-bottom: 14px;
      }
      .timer-circle {
        width: min(92vw, 460px);
        height: min(92vw, 460px);
        border-width: 12px;
        padding: 22px 18px 24px;
      }
      .time {
        font-size: clamp(4.2rem, 17vw, 7rem);
      }
      .status {
        font-size: 1rem;
        min-height: 58px;
      }
      .right-panel {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
        gap: 12px;
      }
      .preset-btn {
        min-height: 88px;
        border-radius: 22px;
      }
      .preset-main {
        font-size: 1.35rem;
      }
      .preset-sub {
        font-size: 0.88rem;
      }
      .icon-btn {
        width: 54px;
        height: 54px;
        font-size: 1.38rem;
      }
      .sound-btn {
        font-size: 0.9rem;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div id="sparkle-container"></div>

  <div class="page">
    <h1 class="title"><span class="title-emoji">⏱️</span>오늘도 합격에 한 걸음 더 ✨</h1>
    <p class="subtitle">
      집중은 짧고 선명하게, 마음은 끝까지 단단하게.<br>
      지금 한 문제, 한 문단이 결국 결과를 만듭니다.
    </p>

    <section class="workspace">
      <div class="left-panel">
        <div class="timer-circle" id="timerCircle">
          <div class="top-sparkle">✨</div>
          <div class="mode-label" id="modeLabel">대기 중</div>
          <div class="time" id="timeDisplay" aria-live="polite"></div>
          <div class="status" id="statusText">원하는 타이머를 눌러 시작하세요</div>
        </div>

        <div class="control-row">
          <button id="pauseBtn" class="icon-btn pause-btn" title="일시 정지" disabled>⏸️</button>
          <button id="resumeBtn" class="icon-btn resume-btn" title="다시 시작" disabled>▶️</button>
          <button id="stopBtn" class="icon-btn stop-btn" title="종료" disabled>⏹️</button>
        </div>

        <div class="control-row">
          <button id="soundBtn" class="sound-btn">🔊 소리 켜짐</button>
        </div>
      </div>

      <aside class="right-panel">
        <button class="preset-btn pink" data-minutes="40" data-label="논술">
          <span class="preset-main">논술</span>
          <span class="preset-sub">(40분)</span>
        </button>
        <button class="preset-btn lavender" data-minutes="10" data-label="마무리">
          <span class="preset-main">마무리</span>
          <span class="preset-sub">(10분)</span>
        </button>
        <button class="preset-btn mint" data-minutes="60" data-label="실무">
          <span class="preset-main">실무</span>
          <span class="preset-sub">(60분)</span>
        </button>
        <button class="preset-btn yellow" data-minutes="5" data-label="추가">
          <span class="preset-main">추가</span>
          <span class="preset-sub">(5분)</span>
        </button>
      </aside>
    </section>
  </div>

  <audio id="keyboardAudio" preload="auto" loop></audio>

  <script>
    const timeDisplay = document.getElementById('timeDisplay');
    const modeLabel = document.getElementById('modeLabel');
    const statusText = document.getElementById('statusText');
    const timerCircle = document.getElementById('timerCircle');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const soundBtn = document.getElementById('soundBtn');
    const presetButtons = document.querySelectorAll('.preset-btn');
    const keyboardAudio = document.getElementById('keyboardAudio');

    const AUDIO_SOURCES = ['keyboard.mp3', './keyboard.mp3', 'keyboard.m4a', './keyboard.m4a'];
    let audioSourceIndex = 0;
    keyboardAudio.volume = 0.62;

    let totalSeconds = 40 * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let isPaused = false;
    let soundEnabled = true;
    let activeLabel = '대기 중';
    let dingPlayed = false;
    let inLastMinute = false;
    let tickIntervalId = null;
    let audioContext = null;
    let hasUserInteracted = false;

    function createSparkles() {
      const container = document.getElementById('sparkle-container');
      const count = window.innerWidth > 900 ? 34 : 22;
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const size = 6 + Math.random() * 12;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        star.style.animationDuration = `${2.8 + Math.random() * 4.8}s`;
        star.style.animationDelay = `${Math.random() * 5}s`;
        container.appendChild(star);
      }
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended' && hasUserInteracted) {
        audioContext.resume();
      }
      return audioContext;
    }

    function renderTimeText(text) {
      timeDisplay.innerHTML = '';
      for (const ch of text) {
        const span = document.createElement('span');
        span.className = ch === ':' ? 'colon' : 'digit';
        span.textContent = ch;
        timeDisplay.appendChild(span);
      }
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateDisplay() {
      renderTimeText(formatTime(remainingSeconds));
      modeLabel.textContent = activeLabel;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function loadAudioSource(index) {
      if (index >= AUDIO_SOURCES.length) return;
      keyboardAudio.src = AUDIO_SOURCES[index];
      keyboardAudio.load();
    }
    keyboardAudio.addEventListener('error', () => {
      audioSourceIndex += 1;
      if (audioSourceIndex < AUDIO_SOURCES.length) {
        loadAudioSource(audioSourceIndex);
      }
    });
    loadAudioSource(audioSourceIndex);

    function beep({ frequency = 880, duration = 0.12, type = 'sine', volume = 0.04, delay = 0, attack = 0.005, release = 0.08 } = {}) {
      if (!soundEnabled) return;
      const ctx = getAudioContext();
      const start = ctx.currentTime + delay;
      const end = start + duration;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, end + release);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(end + release + 0.02);
    }

    function playFiveMinuteAlert() {
      [0, 0.34, 0.68].forEach((delay, idx) => {
        beep({ frequency: 1240 + (idx * 80), duration: 0.14, type: 'triangle', volume: 0.06, delay, attack: 0.004, release: 0.12 });
      });
    }

    function playFinishSound() {
      beep({ frequency: 900, duration: 0.14, type: 'triangle', volume: 0.05, delay: 0 });
      beep({ frequency: 1180, duration: 0.18, type: 'triangle', volume: 0.055, delay: 0.18 });
      beep({ frequency: 1540, duration: 0.24, type: 'triangle', volume: 0.06, delay: 0.4 });
    }

    function startTickTrack() {
      stopTickTrack();
      if (!soundEnabled) return;
      let flip = false;
      tickIntervalId = setInterval(() => {
        flip = !flip;
        beep({
          frequency: flip ? 1760 : 1320,
          duration: flip ? 0.038 : 0.05,
          type: 'square',
          volume: flip ? 0.036 : 0.048,
          attack: 0.002,
          release: 0.04
        });
      }, 500);
    }

    function stopTickTrack() {
      if (tickIntervalId) {
        clearInterval(tickIntervalId);
        tickIntervalId = null;
      }
    }

    async function playKeyboard() {
      if (!soundEnabled || !timerId || isPaused || remainingSeconds <= 60) return;
      try {
        getAudioContext();
        await keyboardAudio.play();
      } catch (error) {
        console.log('keyboard audio play blocked', error);
      }
    }

    function stopKeyboard(reset = false) {
      keyboardAudio.pause();
      if (reset) {
        try { keyboardAudio.currentTime = 0; } catch (e) {}
      }
    }

    function applyButtonState({ pause, resume, stop }) {
      pauseBtn.disabled = !pause;
      resumeBtn.disabled = !resume;
      stopBtn.disabled = !stop;
    }

    function clearRunningTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function resetWarningFlags() {
      dingPlayed = false;
      inLastMinute = false;
      timeDisplay.classList.remove('urgent');
      statusText.classList.remove('urgent');
      stopTickTrack();
    }

    function finishTimer() {
      clearRunningTimer();
      isPaused = false;
      stopKeyboard(true);
      stopTickTrack();
      playFinishSound();
      timerCircle.classList.add('done-flash');
      timeDisplay.classList.remove('urgent');
      statusText.classList.remove('urgent');
      setStatus('종료됨\n수고했어요.\n원하는 타이머를 다시 시작하세요');
      applyButtonState({ pause: false, resume: false, stop: false });
      resetWarningFlags();
    }

    function handleTimedSounds() {
      if (remainingSeconds === 300 && !dingPlayed) {
        dingPlayed = true;
        stopKeyboard(false);
        playFiveMinuteAlert();
        if (timerId && !isPaused && remainingSeconds > 60) {
          setTimeout(() => {
            if (timerId && !isPaused && remainingSeconds > 60) playKeyboard();
          }, 1300);
        }
      }

      if (remainingSeconds <= 60 && remainingSeconds > 0) {
        if (!inLastMinute) {
          inLastMinute = true;
          stopKeyboard(false);
          startTickTrack();
        }
        if (remainingSeconds <= 10) {
          timeDisplay.classList.add('urgent');
          statusText.classList.add('urgent');
          setStatus('종료 임박\n마지막까지 붙잡으세요');
        }
      }
    }

    function tick() {
      if (remainingSeconds <= 0) {
        finishTimer();
        return;
      }
      remainingSeconds -= 1;
      updateDisplay();
      handleTimedSounds();
      if (remainingSeconds === 0) {
        finishTimer();
      }
    }

    function startTimer(minutes, label) {
      hasUserInteracted = true;
      getAudioContext();
      clearRunningTimer();
      stopKeyboard(true);
      stopTickTrack();
      timerCircle.classList.remove('done-flash');
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      activeLabel = label;
      isPaused = false;
      resetWarningFlags();
      updateDisplay();
      setStatus('집중 중\n한 줄 한 줄이 실력입니다');
      applyButtonState({ pause: true, resume: false, stop: true });
      timerId = setInterval(tick, 1000);
      playKeyboard();
    }

    function pauseTimer() {
      if (!timerId) return;
      clearRunningTimer();
      isPaused = true;
      stopKeyboard(false);
      stopTickTrack();
      setStatus('일시 정지\n호흡만 가다듬고 다시 갑니다');
      applyButtonState({ pause: false, resume: true, stop: true });
    }

    function resumeTimer() {
      if (!isPaused || remainingSeconds <= 0) return;
      hasUserInteracted = true;
      getAudioContext();
      timerCircle.classList.remove('done-flash');
      isPaused = false;
      setStatus(remainingSeconds <= 10 ? '종료 임박\n마지막까지 붙잡으세요' : '다시 시작\n끝까지 밀어붙이세요');
      applyButtonState({ pause: true, resume: false, stop: true });
      timerId = setInterval(tick, 1000);
      if (remainingSeconds <= 60) {
        startTickTrack();
        if (remainingSeconds <= 10) {
          timeDisplay.classList.add('urgent');
          statusText.classList.add('urgent');
        }
      } else {
        playKeyboard();
      }
    }

    function stopTimer() {
      clearRunningTimer();
      isPaused = false;
      stopKeyboard(true);
      stopTickTrack();
      remainingSeconds = totalSeconds;
      updateDisplay();
      activeLabel = '대기 중';
      modeLabel.textContent = activeLabel;
      setStatus('종료됨\n원하는 타이머를 다시 시작하세요');
      applyButtonState({ pause: false, resume: false, stop: false });
      timerCircle.classList.remove('done-flash');
      resetWarningFlags();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? '🔊 소리 켜짐' : '🔇 소리 꺼짐';
      if (!soundEnabled) {
        stopKeyboard(false);
        stopTickTrack();
      } else if (timerId && !isPaused) {
        if (remainingSeconds <= 60) {
          startTickTrack();
        } else {
          playKeyboard();
        }
      }
    }

    presetButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const minutes = Number(button.dataset.minutes);
        const label = button.dataset.label;
        startTimer(minutes, label);
      });
    });

    pauseBtn.addEventListener('click', pauseTimer);
    resumeBtn.addEventListener('click', resumeTimer);
    stopBtn.addEventListener('click', stopTimer);
    soundBtn.addEventListener('click', toggleSound);

    ['click', 'touchstart', 'keydown'].forEach((eventName) => {
      window.addEventListener(eventName, () => {
        hasUserInteracted = true;
        try { getAudioContext(); } catch (e) {}
      }, { once: true, passive: true });
    });

    window.addEventListener('resize', createSparkles);

    createSparkles();
    updateDisplay();
    setStatus('원하는 타이머를 눌러 시작하세요');
  </script>
</body>
</html>
