<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전문직 시험 응원 타이머</title>
  <style>
    @font-face {
      font-family: 'EutmanEungtteong';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/OKDDUNG.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'MitmiFont';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2402_1@1.0/Ownglyph_meetme-Rg.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'KerisKeduLine';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_Line.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'OngleipParkDahyeon';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --bg1: #fff7fb;
      --bg2: #ffe4f1;
      --bg3: #ffd6eb;
      --pink1: #ff7dbb;
      --pink2: #ff94c7;
      --pink3: #ffb4da;
      --pink4: #fff0f8;
      --deep: #ca4f93;
      --text: #9d5a7f;
      --text-soft: #a86e8d;
      --white: rgba(255,255,255,0.88);
      --shadow: 0 20px 50px rgba(231, 110, 170, 0.18);
      --line: rgba(255,255,255,0.75);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.96), transparent 24%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.72), transparent 20%),
        radial-gradient(circle at 80% 85%, rgba(255,255,255,0.55), transparent 22%),
        linear-gradient(145deg, var(--bg1), var(--bg2) 52%, var(--bg3));
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .sparkles,
    .sparkles::before,
    .sparkles::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,235,245,0.9) 0 1.3px, transparent 2.2px),
        radial-gradient(circle, rgba(255,255,255,0.6) 0 1px, transparent 1.9px);
      background-size: 170px 170px, 270px 270px, 340px 340px;
      opacity: 0.52;
      animation: twinkle 8s linear infinite;
      z-index: 0;
    }

    .sparkles::before {
      animation-duration: 11s;
      transform: scale(1.06);
      opacity: 0.34;
    }

    .sparkles::after {
      animation-duration: 14s;
      transform: scale(1.12);
      opacity: 0.22;
    }

    @keyframes twinkle {
      0% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(8px, -10px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: min(1120px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.74));
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 28px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      top: -110px;
      right: -90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0));
      pointer-events: none;
    }

    .title {
      font-family: 'KerisKeduLine', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      text-align: center;
      font-size: clamp(2rem, 4.6vw, 3.2rem);
      color: var(--deep);
      margin: 0 0 8px;
      text-shadow: 0 0 18px rgba(255,255,255,0.62);
    }

    .subtitle {
      margin: 0 auto 22px;
      max-width: 680px;
      text-align: center;
      font-size: clamp(0.98rem, 2.2vw, 1.18rem);
      line-height: 1.55;
      color: var(--text-soft);
    }

    .main-layout {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .timer-circle {
      width: min(76vw, 600px);
      height: min(76vw, 600px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.99), rgba(255,245,250,0.97) 58%, rgba(255,220,236,0.94));
      border: 14px solid rgba(255,255,255,0.8);
      box-shadow:
        inset 0 0 28px rgba(255,255,255,0.94),
        0 18px 42px rgba(232, 106, 167, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: 28px;
    }

    .timer-circle::after {
      content: '✦ ✨ ✦';
      position: absolute;
      top: 22px;
      letter-spacing: 8px;
      font-size: 1.02rem;
      color: rgba(255,255,255,0.96);
      text-shadow: 0 0 14px rgba(255,255,255,0.94);
      animation: floatSpark 2.5s ease-in-out infinite;
    }

    @keyframes floatSpark {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .mode-label {
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: clamp(1rem, 2.2vw, 1.16rem);
      color: var(--deep);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,160,204,0.3);
      border-radius: 999px;
      padding: 9px 18px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
    }

    .time {
      font-family: 'EutmanEungtteong', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: clamp(4.5rem, 11vw, 7.4rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      color: #c13f84;
      text-shadow: 0 3px 0 rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }

    .status {
      min-height: 60px;
      font-size: clamp(1rem, 2.3vw, 1.16rem);
      line-height: 1.5;
      color: #a04f78;
      white-space: pre-line;
    }

    .control-row {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .icon-btn {
      border: none;
      cursor: pointer;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink1), var(--pink2));
      box-shadow: 0 10px 20px rgba(235, 103, 168, 0.22);
      color: #fff;
      font-size: 1.55rem;
      line-height: 1;
      display: grid;
      place-items: center;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
    }

    .icon-btn:hover { transform: translateY(-2px); }
    .icon-btn:active { transform: translateY(1px) scale(0.98); }
    .icon-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .pause-btn { background: linear-gradient(135deg, #ff9acd, #ff82bb); }
    .resume-btn { background: linear-gradient(135deg, #ff7dbb, #ff67ad); }
    .stop-btn { background: linear-gradient(135deg, #d95a9d, #bf4387); }

    .sound-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.78);
      color: var(--deep);
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: 1rem;
      box-shadow: 0 8px 18px rgba(234, 112, 172, 0.15);
      transition: transform 0.16s ease;
    }

    .sound-btn:hover { transform: translateY(-1px); }

    .right-panel {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .section-label {
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: 1.02rem;
      color: var(--deep);
      text-align: center;
      margin-bottom: 0;
      grid-column: 1 / -1;
      letter-spacing: 0.08em;
    }

    .preset-btn {
      border: none;
      cursor: pointer;
      width: 100%;
      min-height: 132px;
      border-radius: 28px;
      padding: 20px 16px 16px;
      color: #68435b;
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: 0 14px 26px rgba(170, 108, 143, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      text-align: center;
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
    }

    .preset-btn:nth-of-type(1) {
      background: linear-gradient(135deg, #ffd0e6, #ffc2d2 55%, #ffb3c8);
    }

    .preset-btn:nth-of-type(2) {
      background: linear-gradient(135deg, #dff6ff, #d8e8ff 55%, #ead8ff);
    }

    .preset-btn:nth-of-type(3) {
      background: linear-gradient(135deg, #fff1c9, #ffe2be 55%, #ffd3d9);
    }

    .preset-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 30px rgba(170, 108, 143, 0.22);
      filter: saturate(1.04);
    }

    .preset-btn:active { transform: translateY(1px) scale(0.99); }

    .preset-main {
      display: block;
      font-family: 'OngleipParkDahyeon', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: clamp(1.7rem, 3vw, 2.2rem);
      line-height: 1.08;
      margin-bottom: 10px;
      letter-spacing: 0.12em;
      color: #5f3551;
    }

    .preset-sub {
      display: block;
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: clamp(0.92rem, 1.5vw, 1.03rem);
      letter-spacing: 0.08em;
      opacity: 0.97;
      color: #7a5870;
    }



    /* 일반 문구는 전부 MitmiFont로 고정 */
    body,
    .subtitle,
    .mode-label,
    .status,
    .section-label,
    .preset-btn,
    .preset-sub,
    .sound-btn,
    .control-row,
    .right-panel,
    button,
    .card p,
    .card div {
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    .title {
      font-family: 'KerisKeduLine', 'Apple SD Gothic Neo', sans-serif !important;
    }

    .time {
      font-family: 'EutmanEungtteong', 'Apple SD Gothic Neo', sans-serif !important;
    }

    .preset-main {
      font-family: 'OngleipParkDahyeon', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
    }

    .done-flash {
      animation: pulseGlow 1.1s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow:
          inset 0 0 28px rgba(255,255,255,0.94),
          0 18px 42px rgba(232, 106, 167, 0.2);
      }
      50% {
        box-shadow:
          inset 0 0 32px rgba(255,255,255,0.98),
          0 0 0 14px rgba(255,160,204,0.12),
          0 22px 48px rgba(232, 106, 167, 0.28);
      }
    }

    @media (max-width: 900px) {
      .page {
        padding: 18px 14px 22px;
        align-items: flex-start;
      }

      .card {
        padding: 22px 16px 18px;
        border-radius: 26px;
      }

      .timer-circle {
        width: min(90vw, 520px);
        height: min(90vw, 520px);
        padding: 24px;
      }

      .right-panel {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .preset-btn {
        min-height: 108px;
      }
    }

    @media (min-width: 901px) {
      .right-panel {
        max-width: 900px;
      }
    }

    @media (max-width: 520px) {
      .title { margin-bottom: 10px; }
      .subtitle { margin-bottom: 18px; }
      .timer-circle {
        width: min(94vw, 470px);
        height: min(94vw, 470px);
        border-width: 11px;
      }
      .control-row { gap: 10px; }
      .icon-btn {
        width: 56px;
        height: 56px;
      }
      .sound-btn {
        width: 100%;
      }
      .preset-main {
        font-size: 1.85rem;
      }
      .preset-sub {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles"></div>

  <div class="page">
    <section class="card">
      <h1 class="title">오늘도 합격에 한 걸음 더 ✨</h1>
      <p class="subtitle">
        집중은 짧고 선명하게, 마음은 끝까지 단단하게.<br>
        지금 한 문제, 한 문단이 결국 결과를 만듭니다.
      </p>

      <div class="main-layout">
        <div class="left-panel">
          <div class="timer-circle" id="timerCircle">
            <div class="mode-label" id="modeLabel">대기 중</div>
            <div class="time" id="timeDisplay">40:00</div>
            <div class="status" id="statusText">원하는 타이머를 눌러 시작하세요</div>
          </div>

          <div class="control-row">
            <button id="pauseBtn" class="icon-btn pause-btn" title="일시 정지" disabled>⏸️</button>
            <button id="resumeBtn" class="icon-btn resume-btn" title="다시 시작" disabled>▶️</button>
            <button id="stopBtn" class="icon-btn stop-btn" title="종료" disabled>⏹️</button>
          </div>

          <div class="control-row">
            <button id="soundBtn" class="sound-btn">🔊 키보드 소리 켜짐</button>
          </div>
        </div>

        <div class="right-panel">
          <div class="section-label">타이머 선택</div>

          <button class="preset-btn" data-minutes="40" data-label="논술">
            <span class="preset-main">논술</span>
            <span class="preset-sub">(40분)</span>
          </button>

          <button class="preset-btn" data-minutes="10" data-label="마무리">
            <span class="preset-main">마무리</span>
            <span class="preset-sub">(10분)</span>
          </button>

          <button class="preset-btn" data-minutes="60" data-label="실무">
            <span class="preset-main">실무</span>
            <span class="preset-sub">(60분)</span>
          </button>
        </div>
      </div>
    </section>
  </div>

  <audio id="keyboardAudio" preload="auto" loop></audio>

  <script>
    const timeDisplay = document.getElementById('timeDisplay');
    const modeLabel = document.getElementById('modeLabel');
    const statusText = document.getElementById('statusText');
    const timerCircle = document.getElementById('timerCircle');

    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const soundBtn = document.getElementById('soundBtn');
    const presetButtons = document.querySelectorAll('.preset-btn');

    const keyboardAudio = document.getElementById('keyboardAudio');
    keyboardAudio.volume = 0.72;

    const AUDIO_SOURCES = [
      'keyboard.mp3',
      './keyboard.mp3',
      'keyboard.m4a',
      './keyboard.m4a'
    ];

    let audioSourceIndex = 0;
    let totalSeconds = 40 * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let isPaused = false;
    let soundEnabled = true;
    let activeLabel = '대기 중';

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      modeLabel.textContent = activeLabel;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function loadAudioSource(index) {
      if (index >= AUDIO_SOURCES.length) return;
      keyboardAudio.src = AUDIO_SOURCES[index];
      keyboardAudio.load();
    }

    keyboardAudio.addEventListener('error', () => {
      audioSourceIndex += 1;
      if (audioSourceIndex < AUDIO_SOURCES.length) {
        loadAudioSource(audioSourceIndex);
      }
    });

    loadAudioSource(audioSourceIndex);

    async function playKeyboardSound() {
      if (!soundEnabled || !timerId || isPaused) return;
      try {
        await keyboardAudio.play();
      } catch (error) {
        console.log('오디오 재생이 차단되었거나 파일을 불러오지 못했습니다.', error);
      }
    }

    function stopKeyboardSound() {
      keyboardAudio.pause();
      try {
        keyboardAudio.currentTime = 0;
      } catch (error) {
        console.log(error);
      }
    }

    function pauseKeyboardSound() {
      keyboardAudio.pause();
    }

    function applyButtonState({ pause, resume, stop }) {
      pauseBtn.disabled = !pause;
      resumeBtn.disabled = !resume;
      stopBtn.disabled = !stop;
    }

    function clearRunningTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function finishTimer() {
      clearRunningTimer();
      isPaused = false;
      pauseKeyboardSound();
      timerCircle.classList.add('done-flash');
      setStatus('종료됨\n수고했어요.\n원하는 타이머를 다시 시작하세요');
      applyButtonState({ pause: false, resume: false, stop: true });
    }

    function tick() {
      if (remainingSeconds > 0) {
        remainingSeconds -= 1;
        updateDisplay();
      } else {
        finishTimer();
      }
    }

    function startTimer(minutes, label) {
      clearRunningTimer();
      timerCircle.classList.remove('done-flash');
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      activeLabel = label;
      isPaused = false;
      updateDisplay();
      setStatus('집중 중\n한 줄 한 줄이 실력입니다');
      applyButtonState({ pause: true, resume: false, stop: true });
      timerId = setInterval(tick, 1000);
      playKeyboardSound();
    }

    function pauseTimer() {
      if (!timerId) return;
      clearRunningTimer();
      isPaused = true;
      pauseKeyboardSound();
      setStatus('일시 정지\n호흡만 다시 고르면 됩니다');
      applyButtonState({ pause: false, resume: true, stop: true });
    }

    function resumeTimer() {
      if (!isPaused || remainingSeconds <= 0) return;
      timerCircle.classList.remove('done-flash');
      isPaused = false;
      setStatus('다시 시작\n끝까지 밀어붙이세요');
      applyButtonState({ pause: true, resume: false, stop: true });
      timerId = setInterval(tick, 1000);
      playKeyboardSound();
    }

    function stopTimer() {
      clearRunningTimer();
      isPaused = false;
      remainingSeconds = totalSeconds;
      updateDisplay();
      stopKeyboardSound();
      activeLabel = '대기 중';
      modeLabel.textContent = activeLabel;
      timerCircle.classList.remove('done-flash');
      setStatus('종료됨\n원하는 타이머를\n다시 시작하세요');
      applyButtonState({ pause: false, resume: false, stop: false });
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? '🔊 키보드 소리 켜짐' : '🔇 키보드 소리 음소거';

      if (!soundEnabled) {
        pauseKeyboardSound();
      } else if (timerId && !isPaused) {
        playKeyboardSound();
      }
    }

    presetButtons.forEach(button => {
      button.addEventListener('click', () => {
        const minutes = Number(button.dataset.minutes);
        const label = button.dataset.label;
        startTimer(minutes, label);
      });
    });

    pauseBtn.addEventListener('click', pauseTimer);
    resumeBtn.addEventListener('click', resumeTimer);
    stopBtn.addEventListener('click', stopTimer);
    soundBtn.addEventListener('click', toggleSound);

    updateDisplay();
  </script>
</body>
</html>
