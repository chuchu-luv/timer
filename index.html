<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⭐반짝 반짝 전문직 시험 응원 타이머</title>
  <style>
    @font-face {
      font-family: 'EutmanEungtteong';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/OKDDUNG.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MitmiFont';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2402_1@1.0/Ownglyph_meetme-Rg.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'KerisKeduLine';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_Line.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'OngleipParkDahyeon';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --bg-1: #fffafc;
      --bg-2: #fff2f7;
      --bg-3: #fee8f1;

      --deep: #c34b8d;
      --deep-soft: #aa6b8a;
      --soft: #b87c9a;

      --circle-shadow: 0 18px 42px rgba(228, 112, 166, 0.12);
      --panel-shadow: 0 12px 24px rgba(205, 123, 161, 0.12);

      --pink-1: #f2d4df;
      --pink-2: #e9c1d0;
      --pink-3: #ddb0c3;

      --lav-1: #dfe8f7;
      --lav-2: #d5def3;
      --lav-3: #cdd0ef;

      --mint-1: #dbecea;
      --mint-2: #cde3e0;
      --mint-3: #bdd8d4;

      --yellow-1: #fff2cb;
      --yellow-2: #ffe7b6;
      --yellow-3: #f5d891;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      color: var(--deep-soft);
      background:
        radial-gradient(circle at 14% 14%, rgba(255,255,255,0.96), transparent 24%),
        radial-gradient(circle at 86% 16%, rgba(255,255,255,0.52), transparent 20%),
        linear-gradient(150deg, var(--bg-1), var(--bg-2) 54%, var(--bg-3));
      overflow-x: hidden;
      position: relative;
    }

    #sparkle-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      background: rgba(255,255,255,0.96);
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
      opacity: 0;
      animation: twinkle linear infinite;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.85));
    }

    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.55) rotate(0deg); }
      45%  { opacity: 0.95; transform: scale(1.35) rotate(38deg); }
      100% { opacity: 0; transform: scale(0.55) rotate(90deg); }
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px 18px 70px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-family: 'KerisKeduLine', 'Apple SD Gothic Neo', sans-serif !important;
      font-size: clamp(1.35rem, 2.35vw, 2.2rem);
      line-height: 1.04;
      color: var(--deep);
      white-space: nowrap;
      word-break: keep-all;
      overflow: visible;
      text-overflow: clip;
      text-shadow:
        -3px 0 #fff, 3px 0 #fff, 0 -3px #fff, 0 3px #fff,
        -3px -3px #fff, 3px -3px #fff, -3px 3px #fff, 3px 3px #fff,
        0 6px 16px rgba(255,255,255,0.52);
    }

    .title-emoji {
      margin-right: 6px;
      font-size: 0.86em;
      vertical-align: 0.04em;
    }

    .subtitle {
      margin: 14px auto 22px;
      max-width: 780px;
      text-align: center;
      font-size: clamp(1.12rem, 1.7vw, 1.28rem);
      line-height: 1.78;
      color: var(--soft);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 24px;
      align-items: center;
      justify-content: center;
      min-height: auto;
    }

    .left-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-circle {
      position: relative;
      width: clamp(300px, 37vw, 445px);
      height: clamp(300px, 37vw, 445px);
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.996), rgba(255,248,252,0.99) 58%, rgba(255,236,244,0.97));
      border: 13px solid rgba(255,255,255,0.84);
      box-shadow:
        inset 0 0 28px rgba(255,255,255,0.98),
        var(--circle-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 18px 28px;
      transition: box-shadow 0.2s ease;
    }

    .top-sparkle {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      color: #ffd16b;
      text-shadow: 0 0 12px rgba(255, 240, 178, 0.95);
      animation: floatSpark 2.5s ease-in-out infinite;
    }

    @keyframes floatSpark {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-4px); }
    }

    .mode-label {
      font-size: clamp(1.08rem, 1.2vw, 1.14rem);
      color: var(--deep);
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,182,212,0.58);
      border-radius: 999px;
      padding: 8px 18px;
      margin-bottom: 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
    }

    .time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-family: 'EutmanEungtteong', 'Apple SD Gothic Neo', sans-serif !important;
      font-size: clamp(4.5rem, 8.6vw, 7.1rem);
      line-height: 0.88;
      color: #c24389;
      text-shadow: 0 4px 0 rgba(255,255,255,0.44);
      margin: 2px 0 12px;
      min-height: 1em;
      transform-origin: center;
      transition: transform 0.16s ease, text-shadow 0.16s ease, color 0.16s ease;
      user-select: none;
      letter-spacing: 0;
    }

    .digit, .colon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .digit { width: 0.72em; }

    .colon {
      width: 0.30em;
      transform: translateY(-0.02em);
    }

    .status {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: pre-line;
      text-align: center;
      font-size: clamp(1.12rem, 1.55vw, 1.34rem);
      line-height: 1.56;
      color: #af668b;
      padding: 0 10px;
      transform-origin: center;
      transition: transform 0.16s ease;
    }

    .control-row {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .icon-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
      font-size: 1.42rem;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 18px rgba(235, 103, 168, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .icon-btn:hover { transform: translateY(-2px); }
    .icon-btn:active { transform: translateY(1px) scale(0.98); }

    .icon-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .pause-btn  { background: linear-gradient(145deg, #ffaad3, #ff8dc4); }
    .resume-btn { background: linear-gradient(145deg, #ffa1cf, #ff74b8); }
    .stop-btn   { background: linear-gradient(145deg, #df75ad, #c84d90); }

    .sound-btn {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.84);
      color: var(--deep);
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: 1rem;
      box-shadow: 0 8px 16px rgba(234, 112, 172, 0.12);
      transition: transform 0.16s ease;
    }

    .sound-btn:hover { transform: translateY(-1px); }

    .right-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-content: center;
      justify-items: center;
    }

    .preset-btn {
      border: none;
      cursor: pointer;
      width: 100%;
      min-height: 74px;
      border-radius: 22px;
      padding: 9px 12px 8px;
      color: #68435b;
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow: var(--panel-shadow);
      text-align: center;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .preset-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 24px rgba(190, 129, 161, 0.16);
      filter: saturate(1.03);
    }

    .preset-btn:active { transform: translateY(1px) scale(0.99); }

    .preset-btn.pink     { background: linear-gradient(145deg, var(--pink-1), var(--pink-2) 60%, var(--pink-3)); }
    .preset-btn.lavender { background: linear-gradient(145deg, var(--lav-1), var(--lav-2) 60%, var(--lav-3)); }
    .preset-btn.mint     { background: linear-gradient(145deg, var(--mint-1), var(--mint-2) 60%, var(--mint-3)); }
    .preset-btn.yellow   { background: linear-gradient(145deg, var(--yellow-1), var(--yellow-2) 60%, var(--yellow-3)); }

    .preset-main {
      display: block;
      font-family: 'OngleipParkDahyeon', 'Apple SD Gothic Neo', sans-serif !important;
      font-size: clamp(1.62rem, 1.9vw, 1.95rem);
      line-height: 1.02;
      margin-bottom: 2px;
      letter-spacing: 0.18em;
      color: #613a52;
      padding-left: 0.18em;
    }

    .preset-sub {
      display: block;
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      font-size: 0.98rem;
      line-height: 1.02;
      letter-spacing: 0.03em;
      color: #7a5b70;
      padding-left: 0;
    }

    .circle-warning {
      animation: pulseGlow 1.15s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow:
          inset 0 0 28px rgba(255,255,255,0.98),
          0 18px 42px rgba(232, 106, 167, 0.15);
      }
      50% {
        box-shadow:
          inset 0 0 34px rgba(255,255,255,1),
          0 0 0 12px rgba(255,160,204,0.12),
          0 22px 48px rgba(232, 106, 167, 0.24);
      }
    }

    .urgent {
      animation: urgentBeat 0.72s ease-in-out infinite;
    }

    @keyframes urgentBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .time.urgent {
      color: #d44c82;
      text-shadow: 0 4px 0 rgba(255,255,255,0.42), 0 0 18px rgba(255, 190, 214, 0.56);
    }

    .footer-note {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      font-size: 0.82rem;
      line-height: 1.25;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }
    
    .footer-wish {
      color: rgba(240, 182, 200, 0.88);
      text-shadow: 0 1px 6px rgba(255,255,255,0.72);
    }

    .footer-maker {
      color: rgba(205, 177, 236,0.96);
      text-shadow: 0 1px 8px rgba(195, 75, 141, 0.18);
    }


    @media (max-width: 920px) {
      .page { padding: 10px 14px 72px; }

      .workspace {
        grid-template-columns: 1fr;
        gap: 18px;
        min-height: auto;
      }

      .right-panel {
        width: 100%;
        grid-template-columns: repeat(2, minmax(138px, 188px));
        justify-content: center;
        align-content: start;
        justify-items: center;
      }

      .timer-circle {
        width: min(74vw, 430px);
        height: min(74vw, 430px);
      }
    }

    @media (max-width: 560px) {
      .page { padding: 18px 12px 90px; }

      .title {
        font-size: clamp(0.9rem, 4.8vw, 1.3rem);
        line-height: 1.04;
      }

      .title-emoji { margin-right: 4px; }

      .subtitle {
        font-size: 1.14rem;
        line-height: 1.82;
        margin-bottom: 18px;
      }

      .timer-circle {
        width: min(74vw, 345px);
        height: min(74vw, 345px);
        border-width: 11px;
        padding: 22px 14px 22px;
      }

      .mode-label {
        font-size: 1.04rem;
        margin-bottom: 7px;
      }

      .time {
        font-size: clamp(3.2rem, 12.8vw, 4.8rem);
        margin-bottom: 8px;
      }

      .status {
        font-size: 1.18rem;
        min-height: 78px;
        line-height: 1.56;
      }

      .control-row {
        margin-top: 10px;
        gap: 10px;
      }

      .icon-btn {
        width: 52px;
        height: 52px;
        font-size: 1.3rem;
      }

      .sound-btn {
        font-size: 0.98rem;
        padding: 9px 14px;
      }

      .right-panel {
        grid-template-columns: repeat(2, minmax(132px, 1fr));
        gap: 10px;
        width: 100%;
        justify-items: center;
      }

      .preset-btn {
        min-height: 62px;
        border-radius: 18px;
        padding: 7px 8px 6px;
      }

      .preset-main {
        font-size: 1.36rem;
        line-height: 1;
        margin-bottom: 1px;
        letter-spacing: 0.18em;
        padding-left: 0.18em;
      }

      .preset-sub {
        font-size: 0.9rem;
        line-height: 1;
        font-family: 'MitmiFont', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif !important;
      }

      .footer-note {
        left: 50%;
        bottom: 8px;
        transform: translateX(-50%);
        font-size: 0.74rem;
        line-height: 1.2;
      }
    }
  </style>
</head>
<body>
  <div id="sparkle-container"></div>

  <div class="page">
    <h1 class="title"><span class="title-emoji">⏱️</span>오늘도 합격에 한 걸음 더 ✨</h1>

    <p class="subtitle">
      집중은 짧고 선명하게, 마음은 끝까지 단단하게.<br>
      지금 한 문제, 한 문단이 결국 결과를 만듭니다.
    </p>

    <section class="workspace">
      <div class="left-panel">
        <div class="timer-circle" id="timerCircle">
          <div class="top-sparkle">✨</div>
          <div class="mode-label" id="modeLabel">대기 중</div>
          <div class="time" id="timeDisplay" aria-live="polite"></div>
          <div class="status" id="statusText">원하는 타이머를 눌러 시작하세요</div>
        </div>

        <div class="control-row">
          <button id="pauseBtn" class="icon-btn pause-btn" title="일시 정지" disabled>⏸️</button>
          <button id="resumeBtn" class="icon-btn resume-btn" title="다시 시작" disabled>▶️</button>
          <button id="stopBtn" class="icon-btn stop-btn" title="종료" disabled>⏹️</button>
        </div>

        <div class="control-row">
          <button id="soundBtn" class="sound-btn">🔊 소리 켜짐</button>
        </div>
      </div>

      <aside class="right-panel">
        <button class="preset-btn pink" data-minutes="40" data-label="논술">
          <span class="preset-main">논술</span>
          <span class="preset-sub">(40분)</span>
        </button>

        <button class="preset-btn lavender" data-minutes="10" data-label="마무리">
          <span class="preset-main">마무리</span>
          <span class="preset-sub">(10분)</span>
        </button>

        <button class="preset-btn mint" data-minutes="60" data-label="실무">
          <span class="preset-main">실무</span>
          <span class="preset-sub">(60분)</span>
        </button>

        <button class="preset-btn yellow" data-minutes="5" data-label="추가">
          <span class="preset-main">추가</span>
          <span class="preset-sub">(5분)</span>
        </button>
      </aside>
    </section>
  </div>

  <div class="footer-note">
     <span class="footer-wish">합격을 기원합니다.</span>
     <span class="footer-maker">Created by BOHAE</span>
  </div>

  <audio id="keyboardAudio" preload="auto" loop></audio>

  <script>
    const timeDisplay = document.getElementById('timeDisplay');
    const modeLabel = document.getElementById('modeLabel');
    const statusText = document.getElementById('statusText');
    const timerCircle = document.getElementById('timerCircle');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const soundBtn = document.getElementById('soundBtn');
    const presetButtons = document.querySelectorAll('.preset-btn');
    const keyboardAudio = document.getElementById('keyboardAudio');

    const AUDIO_SOURCES = ['keyboard.mp3', './keyboard.mp3', 'keyboard.m4a', './keyboard.m4a'];
    const statusMessages = {
      '논술': '집중 중\n한 줄 한 줄이 실력입니다',
      '실무': '화이팅!!\n구조를 먼저 세우고 핵심을 채워 넣으세요',
      '마무리': '문맥과 오타 확인하세요.\n핵심만 또렷하게!',
      '추가': '이제 마감 시간입니다.\n마무리 하세요.'
    };

    let audioSourceIndex = 0;
    keyboardAudio.volume = 0.62;

    let totalSeconds = 40 * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let isPaused = false;
    let soundEnabled = true;
    let activeLabel = '대기 중';
    let dingPlayed = false;
    let inLastMinute = false;
    let tickIntervalId = null;
    let audioContext = null;
    let hasUserInteracted = false;

    function createSparkles() {
      const container = document.getElementById('sparkle-container');
      const count = window.innerWidth > 900 ? 34 : 22;
      container.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'sparkle';
        const size = 6 + Math.random() * 12;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        star.style.animationDuration = `${2.8 + Math.random() * 4.8}s`;
        star.style.animationDelay = `${Math.random() * 5}s`;
        container.appendChild(star);
      }
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended' && hasUserInteracted) {
        audioContext.resume();
      }
      return audioContext;
    }

    function renderTimeText(text) {
      timeDisplay.innerHTML = '';
      for (const ch of text) {
        const span = document.createElement('span');
        span.className = ch === ':' ? 'colon' : 'digit';
        span.textContent = ch;
        timeDisplay.appendChild(span);
      }
    }

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateDisplay() {
      renderTimeText(formatTime(remainingSeconds));
      modeLabel.textContent = activeLabel;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function loadAudioSource(index) {
      if (index >= AUDIO_SOURCES.length) return;
      keyboardAudio.src = AUDIO_SOURCES[index];
      keyboardAudio.load();
    }

    keyboardAudio.addEventListener('error', () => {
      audioSourceIndex += 1;
      if (audioSourceIndex < AUDIO_SOURCES.length) {
        loadAudioSource(audioSourceIndex);
      }
    });

    loadAudioSource(audioSourceIndex);

    function beep({
      frequency = 880,
      duration = 0.12,
      type = 'sine',
      volume = 0.04,
      delay = 0,
      attack = 0.005,
      release = 0.08
    } = {}) {
      if (!soundEnabled) return;

      const ctx = getAudioContext();
      const start = ctx.currentTime + delay;
      const end = start + duration;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, start);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, end + release);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(start);
      osc.stop(end + release + 0.02);
    }

    function playFiveMinuteAlert() {
      [0, 0.32, 0.64].forEach((delay, idx) => {
        beep({
          frequency: 1240 + (idx * 80),
          duration: 0.14,
          type: 'triangle',
          volume: 0.06,
          delay,
          attack: 0.004,
          release: 0.12
        });
      });
    }

    function playFinishSound() {
      beep({ frequency: 900, duration: 0.14, type: 'triangle', volume: 0.05, delay: 0 });
      beep({ frequency: 1180, duration: 0.18, type: 'triangle', volume: 0.055, delay: 0.18 });
      beep({ frequency: 1540, duration: 0.24, type: 'triangle', volume: 0.06, delay: 0.4 });
    }

    function startTickTrack() {
      stopTickTrack();
      if (!soundEnabled) return;

      let flip = false;
      tickIntervalId = setInterval(() => {
        flip = !flip;
        beep({
          frequency: flip ? 1960 : 1480,
          duration: flip ? 0.032 : 0.045,
          type: 'square',
          volume: flip ? 0.042 : 0.055,
          attack: 0.002,
          release: 0.035
        });
      }, 420);
    }

    function stopTickTrack() {
      if (tickIntervalId) {
        clearInterval(tickIntervalId);
        tickIntervalId = null;
      }
    }

    async function playKeyboard() {
      if (!soundEnabled || !timerId || isPaused || remainingSeconds <= 60) return;
      try {
        getAudioContext();
        await keyboardAudio.play();
      } catch (error) {
        console.log('keyboard audio play blocked', error);
      }
    }

    function stopKeyboard(reset = false) {
      keyboardAudio.pause();
      if (reset) {
        try { keyboardAudio.currentTime = 0; } catch (e) {}
      }
    }

    function applyButtonState({ pause, resume, stop }) {
      pauseBtn.disabled = !pause;
      resumeBtn.disabled = !resume;
      stopBtn.disabled = !stop;
    }

    function clearRunningTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function resetWarningFlags() {
      dingPlayed = false;
      inLastMinute = false;
      timeDisplay.classList.remove('urgent');
      statusText.classList.remove('urgent');
      timerCircle.classList.remove('circle-warning');
      stopTickTrack();
    }

    function finishTimer() {
      clearRunningTimer();
      isPaused = false;
      stopKeyboard(true);
      stopTickTrack();
      playFinishSound();
      timeDisplay.classList.remove('urgent');
      statusText.classList.remove('urgent');
      timerCircle.classList.remove('circle-warning');
      setStatus('종료됨\n수고했어요.\n원하는 타이머를 다시 시작하세요');
      applyButtonState({ pause: false, resume: false, stop: false });
      resetWarningFlags();
    }

    function handleTimedSounds() {
      if (remainingSeconds === 300 && !dingPlayed) {
        dingPlayed = true;
        stopKeyboard(false);
        playFiveMinuteAlert();

        if (timerId && !isPaused && remainingSeconds > 60) {
          setTimeout(() => {
            if (timerId && !isPaused && remainingSeconds > 60) {
              playKeyboard();
            }
          }, 1300);
        }
      }

      if (remainingSeconds <= 60 && remainingSeconds > 0) {
        if (!inLastMinute) {
          inLastMinute = true;
          stopKeyboard(false);
          startTickTrack();
          timerCircle.classList.add('circle-warning');
        }

        if (remainingSeconds <= 10) {
          timeDisplay.classList.add('urgent');
          statusText.classList.add('urgent');
          setStatus('종료 임박\n마지막까지 붙잡으세요');
        }
      }
    }

    function tick() {
      if (remainingSeconds <= 0) {
        finishTimer();
        return;
      }

      remainingSeconds -= 1;
      updateDisplay();
      handleTimedSounds();

      if (remainingSeconds === 0) finishTimer();
    }

    function startTimer(minutes, label) {
      hasUserInteracted = true;
      getAudioContext();

      clearRunningTimer();
      stopKeyboard(true);
      stopTickTrack();

      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      activeLabel = label;
      isPaused = false;

      resetWarningFlags();
      updateDisplay();
      setStatus(statusMessages[label] || '집중 중\n한 줄 한 줄이 실력입니다');
      applyButtonState({ pause: true, resume: false, stop: true });

      timerId = setInterval(tick, 1000);
      playKeyboard();
    }

    function pauseTimer() {
      if (!timerId) return;

      clearRunningTimer();
      isPaused = true;
      stopKeyboard(false);
      stopTickTrack();

      setStatus('일시 정지\n호흡만 가다듬고 다시 갑니다');
      applyButtonState({ pause: false, resume: true, stop: true });
    }

    function resumeTimer() {
      if (!isPaused || remainingSeconds <= 0) return;

      hasUserInteracted = true;
      getAudioContext();

      isPaused = false;
      setStatus(remainingSeconds <= 10 ? '종료 임박\n마지막까지 붙잡으세요' : (statusMessages[activeLabel] || '다시 시작\n끝까지 밀어붙이세요'));
      applyButtonState({ pause: true, resume: false, stop: true });

      timerId = setInterval(tick, 1000);

      if (remainingSeconds <= 60) {
        timerCircle.classList.add('circle-warning');
        startTickTrack();

        if (remainingSeconds <= 10) {
          timeDisplay.classList.add('urgent');
          statusText.classList.add('urgent');
        }
      } else {
        playKeyboard();
      }
    }

    function stopTimer() {
      clearRunningTimer();
      isPaused = false;
      stopKeyboard(true);
      stopTickTrack();

      remainingSeconds = totalSeconds;
      updateDisplay();

      activeLabel = '대기 중';
      modeLabel.textContent = activeLabel;

      setStatus('종료됨\n원하는 타이머를 다시 시작하세요');
      applyButtonState({ pause: false, resume: false, stop: false });

      timeDisplay.classList.remove('urgent');
      statusText.classList.remove('urgent');
      timerCircle.classList.remove('circle-warning');

      resetWarningFlags();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? '🔊 소리 켜짐' : '🔇 소리 꺼짐';

      if (!soundEnabled) {
        stopKeyboard(false);
        stopTickTrack();
      } else if (timerId && !isPaused) {
        if (remainingSeconds <= 60) startTickTrack();
        else playKeyboard();
      }
    }

    presetButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const minutes = Number(button.dataset.minutes);
        const label = button.dataset.label;
        startTimer(minutes, label);
      });
    });

    pauseBtn.addEventListener('click', pauseTimer);
    resumeBtn.addEventListener('click', resumeTimer);
    stopBtn.addEventListener('click', stopTimer);
    soundBtn.addEventListener('click', toggleSound);

    ['click', 'touchstart', 'keydown'].forEach((eventName) => {
      window.addEventListener(eventName, () => {
        hasUserInteracted = true;
        try { getAudioContext(); } catch (e) {}
      }, { once: true, passive: true });
    });

    window.addEventListener('resize', createSparkles);

    createSparkles();
    updateDisplay();
    setStatus('원하는 타이머를 눌러 시작하세요');
  </script>
</body>
</html>
